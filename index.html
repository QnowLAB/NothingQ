<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NothingQ V3.2</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>NothingQ</h1>

<p>Nothing is Impossible</p>

<div id="hud">

<div>
❤️ Lives
<br>
<span id="lives">3</span>
</div>

<div>
🏆 Score
<br>
<span id="points">0</span>
</div>

<div>
🪙 Coins
<br>
<span id="coinCount">0</span>
</div>

<div>
⭐ Best
<br>
<span id="bestScore">0</span>
</div>

<div>
📈 Level
<br>
<span id="levelNumber">1</span>
</div>

<div>
🔥 Combo
<br>
<span id="combo">x1</span>
</div>

</div>

<button id="shopBtn">🏪 Shop</button>

<div id="game"></div>

<div id="plusOne"></div>

<div id="levelUp"></div>

<!-- SHOP MODAL -->

<div id="shopModal" class="modal hidden">

<div class="modal-content">

<h2>🏪 Shop</h2>

<p>Spend your coins on upgrades.</p>

<button
class="buyBtn"
data-item="life"
data-cost="100">

❤️ Extra Life
<br>
100 🪙

</button>

<button
class="buyBtn"
data-item="combo"
data-cost="50">

🔥 Combo Boost
<br>
50 🪙

</button>

<button
class="buyBtn"
data-item="slow"
data-cost="75">

⚡ Slow Time
<br>
75 🪙

</button>

<p id="shopMessage"></p>

<button id="closeShopBtn">

Close

</button>

</div>

</div>

<!-- GAME OVER -->

<div id="gameOverModal" class="modal hidden">

<div class="modal-content">

<h2>GAME OVER</h2>

<p>
Final Score:
<span id="finalScore">0</span>
</p>

<p>
Best Score:
<span id="bestScoreFinal">0</span>
</p>

<button id="restartBtn">

Restart

</button>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/ui.js"></script>
<script src="js/effects.js"></script>
<script src="js/shop.js"></script>
<script src="js/game.js"></script>

</body>

</html>
